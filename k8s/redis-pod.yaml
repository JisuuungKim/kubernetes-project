apiVersion: v1
kind: Pod
metadata:
  name: redis
  labels:
    app: redis
spec:
  containers:
    - name: redis
      image: redis:7-alpine
      ports:
        - containerPort: 6379
      env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: REDIS_PASSWORD
      command:
        - sh
        - -c
        - redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
      readinessProbe:
        exec:
          command:
            - sh
            - -c
            - redis-cli -a "$REDIS_PASSWORD" ping
        initialDelaySeconds: 5
        periodSeconds: 10
      livenessProbe:
        exec:
          command:
            - sh
            - -c
            - redis-cli -a "$REDIS_PASSWORD" ping
        initialDelaySeconds: 15
        periodSeconds: 20
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "300m"
          memory: "256Mi"
      volumeMounts:
        - name: redis-data
          mountPath: /data
  volumes:
    - name: redis-data
      emptyDir: {}
