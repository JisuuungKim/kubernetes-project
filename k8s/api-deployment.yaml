apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traffic-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: traffic-app
    spec:
      containers:
        - name: traffic-app
          image: traffic-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: COUNTER_API_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: COUNTER_API_URL
            - name: MEME_API_URL
              valueFrom:
                configMapKeyRef:
                  name: api-config
                  key: MEME_API_URL
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
